# hugo.yaml - 完整多语言配置（含菜单翻译）
baseURL: "https://truth-blog.pages.dev"
languageCode: zh-CN
title: truth
theme: PaperMod

params:
  author: 你的名字
  description: "我的个人技术博客"
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true

# === 多语言配置 ===
defaultContentLanguage: zh

languages:
  # 简体中文配置
  zh:
    weight: 1
    languageName: 简体中文
    contentDir: content/zh/article
    title: 我的博客
    
    # 简体中文菜单
    menu:
      main:
        - name: 首页
          url: /
          weight: 1
        - name: 文章
          url: /article/
          weight: 2
        - name: 关于
          url: /about/
          weight: 3

  # 繁体中文配置
  zh-hk:
    weight: 2
    languageName: 繁體中文
    contentDir: content/zh-hk/article
    title: 我的部落格
    
    # 繁体中文菜单
    menu:
      main:
        - name: 首頁
          url: /
          weight: 1
        - name: 文章
          url: /article/
          weight: 2
        - name: 關於
          url: /about/
          weight: 3

  # 英文配置
  en:
    weight: 3
    languageName: English
    contentDir: content/en/article
    title: My Blog
    
    # 英文菜单
    menu:
      main:
        - name: Home
          url: /
          weight: 1
        - name: Article
          url: /article/
          weight: 2
        - name: About
          url: /about/
          weight: 3